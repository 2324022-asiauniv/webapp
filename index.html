<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Earthquake Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-2px, 1px) rotate(-0.5deg); }
            50% { transform: translate(2px, -1px) rotate(0.5deg); }
            75% { transform: translate(-1px, -1px) rotate(-0.2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shaking {
            animation: shake 0.1s infinite;
        }
        #map-container {
            cursor: crosshair;
            background: #1e293b;
            position: relative;
            overflow: hidden;
        }
        /* 日本地図のSVGスタイル */
        .japan-map {
            width: 100%;
            height: 100%;
            fill: #334155;
            stroke: #475569;
            stroke-width: 0.5;
        }
        .epicenter {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #ef4444 0%, transparent 70%);
            border: 2px solid #ef4444;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
        }
        .wave {
            position: absolute;
            border: 2px solid #ef4444;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple 2.5s ease-out forwards;
            z-index: 10;
        }
        @keyframes ripple {
            from { width: 0; height: 0; opacity: 1; border-width: 4px; }
            to { width: 1200px; height: 1200px; opacity: 0; border-width: 1px; }
        }
        .building {
            transition: transform 0.1s;
        }
        .intensity-tag {
            position: absolute;
            font-weight: bold;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
            transform: translate(-50%, -150%);
            z-index: 30;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-red-500 tracking-tight flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Japan Earthquake Simulator
                </h1>
                <p class="text-slate-400 text-sm">日本列島を舞台に、地震の衝撃と影響をシミュレートします</p>
            </div>
            <div id="status-badge" class="w-fit px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-sm font-medium">
                待機中
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Controls Panel -->
            <div class="space-y-6 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    シミュレーション設定
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">発生場所 (地図をクリック)</label>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-slate-950 border border-slate-800 rounded-lg p-2 text-center text-sm font-mono">
                                <span class="text-slate-500 mr-1">X:</span><span id="pos-x-val">---</span>
                            </div>
                            <div class="flex-1 bg-slate-950 border border-slate-800 rounded-lg p-2 text-center text-sm font-mono">
                                <span class="text-slate-500 mr-1">Y:</span><span id="pos-y-val">---</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">マグニチュード (M)</label>
                        <input type="number" id="magnitude" step="0.1" min="1.0" max="9.9" placeholder="自動 (M3.0〜9.0)" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 focus:ring-2 focus:ring-red-500 outline-none transition-all placeholder:text-slate-700">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">最大震度</label>
                        <select id="intensity" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 focus:ring-2 focus:ring-red-500 outline-none transition-all">
                            <option value="">自動 (Mから推定)</option>
                            <option value="1">震度1</option>
                            <option value="2">震度2</option>
                            <option value="3">震度3</option>
                            <option value="4">震度4</option>
                            <option value="5">震度5弱/強</option>
                            <option value="6">震度6弱/強</option>
                            <option value="7">震度7</option>
                        </select>
                    </div>

                    <button id="btn-run" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-red-900/30 active:scale-95 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                        シミュレーション実行
                    </button>
                </div>

                <div class="pt-6 border-t border-slate-800">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">震源履歴</h3>
                    <div id="history-list" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                        <div class="text-slate-600 italic text-xs py-4 text-center">記録なし</div>
                    </div>
                </div>
            </div>

            <!-- Visualization Area -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Map Area -->
                <div id="map-container" class="relative h-[400px] md:h-[500px] rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
                    <!-- SVG Japan Map (Simplified paths) -->
                    <svg viewBox="0 0 800 800" class="japan-map">
                        <!-- 北海道 -->
                        <path d="M550,50 L650,30 L730,80 L700,150 L630,160 L580,180 L540,140 Z" />
                        <!-- 本州 -->
                        <path d="M540,190 L560,250 L580,300 L560,350 L500,420 L400,480 L300,500 L250,520 L200,530 L180,510 L250,460 L350,400 L450,320 L500,240 Z" />
                        <!-- 四国 -->
                        <path d="M280,540 L340,530 L350,560 L300,580 Z" />
                        <!-- 九州 -->
                        <path d="M150,550 L200,540 L210,600 L180,650 L140,620 Z" />
                        <!-- 沖縄 (簡易表示) -->
                        <circle cx="100" cy="720" r="5" />
                        <circle cx="80" cy="740" r="4" />
                    </svg>
                    
                    <div class="absolute top-4 left-4 bg-slate-950/60 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] text-slate-400 border border-slate-800">
                        JAPAN REGION SELECTOR
                    </div>
                    <div id="epicenter-layer"></div>
                </div>

                <!-- Ground & Buildings -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 relative shadow-xl">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">局所的な揺れの影響 (都市部)</h3>
                    <div id="city-view" class="h-40 relative flex items-end justify-around px-4 pb-1">
                        <!-- Ground line -->
                        <div class="absolute bottom-0 left-0 right-0 h-1 bg-red-900 opacity-50"></div>
                        <!-- Buildings generated here -->
                    </div>
                </div>

                <!-- Detailed Results -->
                <div id="info-panel" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">規模</div>
                        <div id="res-m" class="text-2xl font-black text-red-500 italic">--</div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">最大震度</div>
                        <div id="res-i" class="text-2xl font-black text-orange-500">--</div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">深さ (推定)</div>
                        <div class="text-xl font-bold">10km</div>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">津波の恐れ</div>
                        <div id="tsunami-info" class="text-xl font-bold text-slate-300">調査中</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mapContainer = document.getElementById('map-container');
        const epicenterLayer = document.getElementById('epicenter-layer');
        const cityView = document.getElementById('city-view');
        const btnRun = document.getElementById('btn-run');
        const historyList = document.getElementById('history-list');
        const statusBadge = document.getElementById('status-badge');

        let selectedPos = null;
        let isSimulating = false;

        // Initialize City
        function setupCity() {
            cityView.innerHTML = '<div class="absolute bottom-0 left-0 right-0 h-1 bg-red-900 opacity-50"></div>';
            const buildingCount = window.innerWidth < 768 ? 8 : 15;
            for (let i = 0; i < buildingCount; i++) {
                const b = document.createElement('div');
                const h = 20 + Math.random() * 80;
                const w = 12 + Math.random() * 15;
                b.className = 'building bg-slate-800 rounded-t-sm border-t border-x border-slate-700 relative flex flex-col justify-end items-center gap-1 pb-1';
                b.style.height = `${h}px`;
                b.style.width = `${w}px`;
                
                // Add tiny windows
                const winRow = Math.floor(h / 15);
                for(let r=0; r<winRow; r++) {
                    const row = document.createElement('div');
                    row.className = 'flex gap-1 opacity-20';
                    row.innerHTML = '<div class="w-1.5 h-1.5 bg-blue-300 rounded-sm"></div><div class="w-1.5 h-1.5 bg-blue-300 rounded-sm"></div>';
                    b.appendChild(row);
                }
                cityView.appendChild(b);
            }
        }
        setupCity();
        window.addEventListener('resize', setupCity);

        // Map Click Interaction
        mapContainer.addEventListener('click', (e) => {
            if (isSimulating) return;
            
            const rect = mapContainer.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            
            selectedPos = { x, y };
            
            document.getElementById('pos-x-val').innerText = x;
            document.getElementById('pos-y-val').innerText = y;

            epicenterLayer.innerHTML = `<div class="epicenter" style="left: ${x}px; top: ${y}px;"></div>`;
        });

        // Run Logic
        btnRun.addEventListener('click', () => {
            if (isSimulating) return;

            let mag = parseFloat(document.getElementById('magnitude').value);
            let intensity = parseInt(document.getElementById('intensity').value);
            
            // Randomly set position if not selected
            if (!selectedPos) {
                const rect = mapContainer.getBoundingClientRect();
                selectedPos = {
                    x: Math.round(150 + Math.random() * (rect.width - 300)),
                    y: Math.round(100 + Math.random() * (rect.height - 200))
                };
                document.getElementById('pos-x-val').innerText = selectedPos.x;
                document.getElementById('pos-y-val').innerText = selectedPos.y;
                epicenterLayer.innerHTML = `<div class="epicenter" style="left: ${selectedPos.x}px; top: ${selectedPos.y}px;"></div>`;
            }

            // Fill missing data
            if (isNaN(mag)) {
                mag = (3.5 + Math.random() * 5).toFixed(1);
                document.getElementById('magnitude').value = mag;
            } else {
                mag = mag.toFixed(1);
            }

            if (isNaN(intensity)) {
                // Heuristic estimation
                intensity = Math.min(7, Math.max(1, Math.floor(mag - 1.2 + Math.random() * 0.5)));
            }

            executeSimulation(mag, intensity, selectedPos);
        });

        function executeSimulation(m, i, pos) {
            isSimulating = true;
            btnRun.disabled = true;
            btnRun.classList.add('opacity-50', 'cursor-not-allowed');
            statusBadge.innerText = "🚨 緊急地震速報";
            statusBadge.className = "px-4 py-2 rounded-full bg-red-600 text-white text-sm font-black animate-bounce";

            // Update UI Panel
            const infoPanel = document.getElementById('info-panel');
            infoPanel.classList.remove('hidden');
            document.getElementById('res-m').innerText = `M${m}`;
            document.getElementById('res-i').innerText = `震度 ${i}`;
            
            const tsunami = m >= 7.0 ? "警戒が必要" : "なし";
            document.getElementById('tsunami-info').innerText = tsunami;
            document.getElementById('tsunami-info').className = `text-xl font-bold ${m >= 7.0 ? 'text-yellow-400' : 'text-slate-300'}`;

            // 1. Map Animation
            const wave = document.createElement('div');
            wave.className = 'wave';
            wave.style.left = `${pos.x}px`;
            wave.style.top = `${pos.y}px`;
            epicenterLayer.appendChild(wave);
            setTimeout(() => wave.remove(), 2500);

            // 2. Local Shaking (City)
            const buildings = document.querySelectorAll('.building');
            const shakeIntensity = i;
            
            buildings.forEach((b, idx) => {
                const delay = idx * 30;
                setTimeout(() => {
                    b.classList.add('shaking');
                    b.style.animationDuration = `${0.25 / (shakeIntensity * 0.4)}s`;
                    b.style.filter = `drop-shadow(0 0 ${shakeIntensity}px rgba(239, 68, 68, 0.4))`;
                }, delay);
            });

            // 3. Status Update over time
            setTimeout(() => {
                statusBadge.innerText = "揺れに警戒してください";
                statusBadge.className = "px-4 py-2 rounded-full bg-orange-600 text-white text-sm font-bold animate-pulse";
            }, 1000);

            // End Simulation
            const duration = 2000 + (i * 800);
            setTimeout(() => {
                finalize(m, i, pos);
            }, duration);
        }

        function finalize(m, i, pos) {
            isSimulating = false;
            btnRun.disabled = false;
            btnRun.classList.remove('opacity-50', 'cursor-not-allowed');
            statusBadge.innerText = "待機中";
            statusBadge.className = "px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-sm";

            document.querySelectorAll('.building').forEach(b => {
                b.classList.remove('shaking');
                b.style.filter = 'none';
            });

            // Update History
            if (historyList.querySelector('.italic')) historyList.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'group bg-slate-800/40 p-3 rounded-xl border border-slate-800 hover:border-red-500/50 transition-colors flex justify-between items-center';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const intensityColor = i >= 5 ? 'text-red-500' : (i >= 3 ? 'text-orange-500' : 'text-yellow-500');

            item.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 font-bold">${time}</span>
                    <span class="text-sm font-black">M${m} <span class="${intensityColor}">震度${i}</span></span>
                </div>
                <div class="text-[10px] font-mono text-slate-600 bg-slate-950 px-2 py-1 rounded">
                    X:${pos.x} Y:${pos.y}
                </div>
            `;
            historyList.prepend(item);
        }
    </script>
</body>
</html>
